name: CI/CD → Docker Hub (VirtualBox / Portainer)

# Pushes a fresh :latest image to Docker Hub on every merge to main.
# Watchtower running inside the VirtualBox VM polls Docker Hub every 5 min
# and restarts eventstracker automatically — no webhook or open port needed.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/eventstracker

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # eventstracker depends on sathishlogger as a local SNAPSHOT.
      # Clone and install it into the local Maven repo before building.
      - name: Install sathishlogger dependency
        run: |
          git clone https://github.com/${{ github.repository_owner }}/sathishlogger.git /tmp/sathishlogger
          cd /tmp/sathishlogger
          mvn install -DskipTests -B

      - name: Build eventstracker (skip tests)
        run: |
          ./mvnw package -DskipTests -B
          mv target/*.jar target/app.jar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/app.jar
          retention-days: 1

  # ── Docker push ───────────────────────────────────────────────────────────
  docker:
    name: Docker push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Write summary
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA tag**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Watchtower** will auto-redeploy in ≤ 5 min" >> "$GITHUB_STEP_SUMMARY"

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    if: failure()
    runs-on: ubuntu-latest
    needs: [ build, docker ]
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[eventstracker] Docker push failed - ${{ github.workflow }}"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_FROM }}
          body: |
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
