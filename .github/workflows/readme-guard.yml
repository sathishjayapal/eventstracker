name: README Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  require-readme-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate README update for important changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            echo "No valid base SHA found (initial branch push). Skipping README guard."
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"

          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "No file changes detected."
            exit 0
          fi

          IMPORTANT_PATTERN='^(src/|pom\.xml$|docker-compose\.yml$|init\.sql$|eventtracker\.sh$|CONFIG_SERVER_SETUP\.md$|RUN_FROM_INTELLIJ\.md$|SETUP_GUIDE\.md$)'
          README_PATTERN='^(README\.md$|docs/README\.md$)'

          IMPORTANT_CHANGED="$(echo "${CHANGED_FILES}" | grep -E "${IMPORTANT_PATTERN}" || true)"
          README_CHANGED="$(echo "${CHANGED_FILES}" | grep -E "${README_PATTERN}" || true)"

          if [[ -n "${IMPORTANT_CHANGED}" && -z "${README_CHANGED}" ]]; then
            echo "Important project files changed but README was not updated."
            echo
            echo "Changed important files:"
            echo "${IMPORTANT_CHANGED}"
            echo
            echo "Please update README.md or docs/README.md to reflect the true current project state."
            exit 1
          fi

          echo "README guard passed."
