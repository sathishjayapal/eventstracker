spring:
  docker:
    compose:
      enabled: false
      start:
        skip: if_running
      lifecycle-management: none

  datasource:
    url: ${eventstracker_JDBC_DATABASE_URL:jdbc:postgresql://localhost:5445/eventstracker_db}
    username: ${eventstracker_JDBC_DATABASE_USERNAME:postgres}
    password: ${eventstracker_JDBC_DATABASE_PASSWORD:P4ssword!}
    hikari:
      connection-timeout: 50000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    http-statuses:
      org.springframework.security.authorization.AuthorizationDeniedException: unauthorized
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
springdoc:
  pathsToMatch: /api/**
server:
  port: 9081
  processRunEvents:
    fixedRate: 10000
sathishprojects:
  sathish_project_events_exchange: x.sathishprojects.fanout
  github_routing_key: sathishprojects.github.api.event
  garmin_routing_key: sathishprojects.garmin.api.event
# Event Domain User Configuration
eventDomainUser: ${EVENT_DOMAIN_USER:sathish}
eventDomainUserPassword: ${EVENT_DOMAIN_USER_PASSWORD:pass}
decorator:
  datasource:
    p6spy:
      enable-logging: true
      custom-appender-class: com.p6spy.engine.spy.appender.MultiLineFormat
