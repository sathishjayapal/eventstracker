spring:
  application:
    name: eventstracker
  docker:
    compose:
      enabled: false
      start:
        skip: if_running
      lifecycle-management: none

# Common defaults - environment-specific configs loaded from config server
springdoc:
  pathsToMatch: /api/**

server:
  processRunEvents:
    fixedRate: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
